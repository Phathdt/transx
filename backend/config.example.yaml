app:
  environment: local
  log_level: info

http:
  address: ':4000'
  cors_allowed_origins:
    - 'http://localhost:3000'
    - 'http://127.0.0.1:3000'
    - 'http://localhost:5173'
    - 'http://127.0.0.1:5173'

postgres:
  database_url: 'postgres://transx:transx@localhost:15432/transx?sslmode=disable'

redis:
  addr: 'localhost:16379'
  password: ''
  db: 0

kafka:
  brokers:
    - 'localhost:9092'

auth:
  # HS256 signing secret. Override in non-local envs via AUTH__JWT_SECRET.
  jwt_secret: 'dev-secret-change-me'
  jwt_ttl: 15m
  refresh_ttl: 720h
  cookie_name: refresh_token
  cookie_secure: false
  cookie_same_site: none

fx:
  # Static MVP rates. Key direction is FROM_TO; same-currency quotes use rate 1.
  rates:
    VND_USD: '0.00003924'
    USD_VND: '25484.20'
    USD_EUR: '0.92'
    EUR_USD: '1.0870'
  # Flat cross-currency fee charged in the source currency when a transfer
  # converts out of it. Key is the source currency code; missing = no fee.
  fees:
    USD: '1'
    VND: '10000'
  # gRPC transport: grpc_address is where the consumer dials the FX service;
  # listen_address is where the fx service serves.
  grpc_address: 'localhost:50051'
  listen_address: ':50051'

