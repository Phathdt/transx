app:
  environment: local
  log_level: info

http:
  address: ':4000'
  cors_allowed_origins:
    - 'http://localhost:5173'
    - 'http://127.0.0.1:5173'

postgres:
  database_url: 'postgres://transx:transx@localhost:15432/transx?sslmode=disable'

kafka:
  brokers:
    - 'localhost:9092'

auth:
  # HS256 signing secret. Override in non-local envs via AUTH__JWT_SECRET.
  jwt_secret: 'dev-secret-change-me'
  jwt_ttl: 24h

fx:
  # Static MVP rates. Key direction is FROM_TO; same-currency quotes use rate 1.
  rates:
    VND_USD: '0.00003924'
    USD_VND: '25484.20'
    USD_EUR: '0.92'
    EUR_USD: '1.0870'

