openapi: 3.1.0
info:
  title: transx API
  description: transx API
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /accounts:
    post:
      tags:
        - wallet
      summary: Create a wallet account for the caller
      description: Create a wallet account for the caller
      operationId: createAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DtoCreateAccountCommand'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DtoAccountResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
  /accounts/{accountId}:
    get:
      tags:
        - wallet
      summary: Get a wallet account balance
      description: Get a wallet account balance
      operationId: getAccount
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DtoAccountResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
  /check:
    get:
      tags:
        - auth
      summary: 'ForwardAuth check: verify bearer token, echo X-User-Id'
      description: 'ForwardAuth check: verify bearer token, echo X-User-Id'
      operationId: check
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
  /login:
    post:
      tags:
        - auth
      summary: Authenticate with email and password, returns a JWT
      description: Authenticate with email and password, returns a JWT
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DtoLoginCommand'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DtoLoginResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
  /transfers:
    post:
      tags:
        - wallet
      summary: Create a transfer (idempotent via Idempotency-Key). INTERNAL needs toAccountId; EXTERNAL omits it (provider is set from server config).
      description: Create a transfer (idempotent via Idempotency-Key). INTERNAL needs toAccountId; EXTERNAL omits it (provider is set from server config).
      operationId: createTransfer
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - fromAccountId
                - amount
                - currency
              properties:
                amount:
                  type: string
                currency:
                  type: string
                fromAccountId:
                  type: string
                toAccountId:
                  type: string
                transferType:
                  type: string
        required: true
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DtoTransferResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
  /transfers/{transferId}:
    get:
      tags:
        - wallet
      summary: 'Get a transfer by its business reference (ETN- for EXTERNAL, ITN- for INTERNAL, followed by a ULID)'
      description: 'Get a transfer by its business reference (ETN- for EXTERNAL, ITN- for INTERNAL, followed by a ULID)'
      operationId: getTransfer
      parameters:
        - name: transferId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DtoTransferResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlersErrorResponse'
components:
  schemas:
    DtoAccountResponse:
      type: object
      properties:
        accountId:
          type: string
        availableBalance:
          type: string
        currency:
          type: string
        holdBalance:
          type: string
        status:
          type: string
    DtoCreateAccountCommand:
      type: object
      required:
        - currency
      properties:
        currency:
          type: string
        name:
          type: string
    DtoLoginCommand:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string
    DtoLoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
        userId:
          type: string
    DtoTransferResponse:
      type: object
      properties:
        destinationAmount:
          type: string
        destinationCurrency:
          type: string
        destinationFxRate:
          type: string
        failureReason:
          type: string
        feeAmount:
          type: string
        feeCurrency:
          type: string
        sourceAmount:
          type: string
        sourceCurrency:
          type: string
        sourceFxRate:
          type: string
        status:
          type: string
        transactionAmount:
          type: string
        transactionCurrency:
          type: string
        transferId:
          type: string
    HandlersErrorResponse:
      type: object
      properties:
        error:
          type: string
        requestId:
          type: string
        traceId:
          type: string
