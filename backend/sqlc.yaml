version: '2'
overrides:
  go:
    overrides:
      # timestamp without time zone (rarely used in this schema)
      - db_type: 'pg_catalog.timestamp'
        engine: 'postgresql'
        go_type:
          import: 'time'
          type: 'Time'
          pointer: false

      - db_type: 'pg_catalog.timestamp'
        engine: 'postgresql'
        nullable: true
        go_type:
          import: 'time'
          type: 'Time'
          pointer: true

      # timestamptz — used by created_at/updated_at/execute_at/read_at/etc.
      # sqlc matches the bare type name for timestamptz (pg_catalog.timestamptz
      # does not apply with sqlc v1.30 + pgx/v5).
      - db_type: 'timestamptz'
        engine: 'postgresql'
        go_type:
          import: 'time'
          type: 'Time'
          pointer: false

      - db_type: 'timestamptz'
        engine: 'postgresql'
        nullable: true
        go_type:
          import: 'time'
          type: 'Time'
          pointer: true

      # uuid — same bare-name rule as timestamptz with sqlc v1.30 + pgx/v5.
      - db_type: 'uuid'
        engine: 'postgresql'
        go_type:
          import: 'github.com/google/uuid'
          type: 'UUID'
          pointer: false

      - db_type: 'uuid'
        engine: 'postgresql'
        nullable: true
        go_type:
          import: 'github.com/google/uuid'
          type: 'UUID'
          pointer: true

      - db_type: 'pg_catalog.bool'
        nullable: true
        go_type:
          import: github.com/guregu/null/v5
          package: 'null'
          type: Bool

      - db_type: 'pg_catalog.int8'
        go_type: 'int64'

      - db_type: 'pg_catalog.int8'
        nullable: true
        go_type:
          import: github.com/guregu/null/v5
          package: 'null'
          type: Int64

      - db_type: 'pg_catalog.numeric'
        go_type:
          import: github.com/shopspring/decimal
          type: 'Decimal'
          pointer: false

      - db_type: 'pg_catalog.numeric'
        nullable: true
        go_type:
          import: github.com/shopspring/decimal
          type: 'NullDecimal'
          pointer: false

      - db_type: 'pg_catalog.int4'
        go_type: 'int'

      - db_type: 'pg_catalog.int4'
        nullable: true
        go_type:
          import: github.com/guregu/null/v5
          package: 'null'
          type: Int

      - db_type: 'decimal'
        go_type:
          import: github.com/shopspring/decimal
          type: 'Decimal'
          pointer: false

      - db_type: 'decimal'
        nullable: true
        go_type:
          import: github.com/shopspring/decimal
          type: 'NullDecimal'
          pointer: false

sql:
  - engine: 'postgresql'
    queries: 'internal/modules/auth/infrastructure/query/*.sql'
    schema: 'db/migrations'
    gen:
      go:
        package: 'gen'
        out: 'internal/modules/auth/infrastructure/gen'
        sql_package: 'pgx/v5'
        omit_unused_structs: true
        emit_json_tags: false
        emit_prepared_queries: true
        emit_db_tags: true
        emit_result_struct_pointers: true
        emit_pointers_for_null_types: true

  - engine: 'postgresql'
    queries: 'internal/modules/wallet/infrastructure/query/*.sql'
    schema: 'db/migrations'
    gen:
      go:
        package: 'gen'
