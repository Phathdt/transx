x-backend-env: &backend-env
  POSTGRES__DATABASE_URL: postgres://transx:transx@postgres:5432/transx?sslmode=disable
  REDIS__ADDR: redis:6379
  KAFKA__BROKERS: redpanda:29092
  # Non-local environment switches slog to JSON output so Promtail can parse
  # level/trace_id fields and ship structured logs to Loki.
  APP__ENVIRONMENT: "docker"

x-backend: &backend
  image: transx-backend
  build:
    context: ./backend
  environment:
    <<: *backend-env
  volumes:
    - ./backend/config.yaml:/app/config.yaml:ro
    - ./backend/.env:/app/.env:ro

services:
  traefik:
    image: traefik:v3.7.5
    container_name: transx-traefik
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      # Host 4000 -> Traefik web entrypoint (80). FE keeps calling :4000 unchanged.
      - "4000:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    container_name: transx-postgres
    # wal_level=logical (plus replication slots/senders) lets iris stream
    # outbox_events via logical replication. These are startup GUCs.
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    environment:
      POSTGRES_DB: transx
      POSTGRES_USER: transx
      POSTGRES_PASSWORD: transx
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transx -d transx"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: transx-redis
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Dedicated Redis for React Router Node SSR AT cache (rr:at:*).
  # Isolated from Go auth Redis (auth:rt:* on service `redis`).
  redis-rr:
    image: redis:7-alpine
    container_name: transx-redis-rr
    ports:
      - "${RR_REDIS_PORT:-16380}:6379"
    volumes:
      - redis-rr-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.3
    container_name: transx-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092,INTERNAL://redpanda:29092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
    ports:
      - "9092:9092"
      - "29092:29092"
      - "8082:8082"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 12

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.3
    container_name: transx-redpanda-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for topic in \
          transfer.requested transx.transfer.retry-6s transx.transfer.retry-30s transx.transfer.retry-5m transx.transfer.dlq transfer.completed transfer.failed \
          \
          \
          transx.notification.retry-6s transx.notification.retry-30s transx.notification.retry-5m \
          transx.notification.dlq; do
          rpk topic create "$$topic" \
            --brokers redpanda:29092 \
            --partitions 1 \
            --replicas 1 || true
        done

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    container_name: transx-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "18080:8080"

  migrate:
    <<: *backend
    container_name: transx-migrate
    command: ["migrate", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  auth:
    <<: *backend
    container_name: transx-auth
    command: ["auth"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    labels:
      - traefik.enable=true
      # Public auth routes — no forward-auth (cookie/login bootstrap).
      - traefik.http.routers.auth-login.rule=PathPrefix(`/api/v1/login`)
      - traefik.http.routers.auth-login.entrypoints=web
      - traefik.http.routers.auth-login.service=auth-svc
      - traefik.http.routers.auth-refresh.rule=PathPrefix(`/api/v1/refresh`)
      - traefik.http.routers.auth-refresh.entrypoints=web
      - traefik.http.routers.auth-refresh.service=auth-svc
      - traefik.http.routers.auth-logout.rule=PathPrefix(`/api/v1/logout`)
      - traefik.http.routers.auth-logout.entrypoints=web
      - traefik.http.routers.auth-logout.service=auth-svc
      - traefik.http.routers.auth-session.rule=PathPrefix(`/api/v1/session`)
      - traefik.http.routers.auth-session.entrypoints=web
      - traefik.http.routers.auth-session.service=auth-svc
      - traefik.http.services.auth-svc.loadbalancer.server.port=4000
      # Browser CORS preflight (OPTIONS + Access-Control-Request-Headers:
      # authorization) must be answered here. Traefik ForwardAuth always hits
      # GET /api/v1/check without a bearer on OPTIONS, so preflight would 401
      # before the real request. headers middleware short-circuits OPTIONS.
      - traefik.http.middlewares.cors.headers.accesscontrolallowmethods=GET,POST,OPTIONS
      - traefik.http.middlewares.cors.headers.accesscontrolallowheaders=Authorization,Content-Type,Accept,Origin
      - traefik.http.middlewares.cors.headers.accesscontrolalloworiginlist=http://localhost:3000,http://127.0.0.1:3000
      - traefik.http.middlewares.cors.headers.accesscontrolallowcredentials=true
      - traefik.http.middlewares.cors.headers.accesscontrolmaxage=100
      - traefik.http.middlewares.cors.headers.addvaryheader=true
      # ForwardAuth middleware: Traefik calls /api/v1/check; on 2xx it copies
      # X-User-Id onto the upstream request, on 401 it rejects the client.
      - traefik.http.middlewares.forward-auth.forwardauth.address=http://auth:4000/api/v1/check
      - traefik.http.middlewares.forward-auth.forwardauth.authResponseHeaders=X-User-Id

  # API-only: serves wallet HTTP routes. Background work runs in the
  # iris (CDC) and consumer services, so this needs no Kafka.
  wallet:
    <<: *backend
    container_name: transx-wallet
    command: ["wallet"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    labels:
      - traefik.enable=true
      # Public provider-beneficiary validation route; all other wallet routes stay gated.
      - traefik.http.routers.wallet-external-lookup.rule=PathPrefix(`/api/v1/accounts/external/`)
      - traefik.http.routers.wallet-external-lookup.entrypoints=web
      - traefik.http.routers.wallet-external-lookup.priority=100
      - traefik.http.routers.wallet-external-lookup.service=wallet-svc
      # All other non-login traffic flows here, gated by forward-auth.
      - traefik.http.routers.wallet.rule=PathPrefix(`/`)
      - traefik.http.routers.wallet.entrypoints=web
      - traefik.http.routers.wallet.middlewares=cors,forward-auth
      - traefik.http.services.wallet-svc.loadbalancer.server.port=4000
      - traefik.http.routers.wallet.service=wallet-svc

  # API-only: serves transfer HTTP routes. Background work runs in the
  # iris (CDC) and consumer services, so this needs no Kafka.
  transfer:
    <<: *backend
    container_name: transx-transfer
    command: ["transfer"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.transfer.rule=PathPrefix(`/api/v1/transfers`)
      - traefik.http.routers.transfer.entrypoints=web
      - traefik.http.routers.transfer.priority=90
      - traefik.http.routers.transfer.middlewares=cors,forward-auth
      - traefik.http.routers.transfer.service=transfer-svc
      - traefik.http.services.transfer-svc.loadbalancer.server.port=4000

  # Drains the outbox table to Kafka via Postgres logical replication (CDC).
  # Replaces the in-house outbox-replayer. Single instance by design: one
  # replication slot, so ordering relies on exactly one iris running.
  iris:
    image: phathdt379/iris:v0.2.0
    container_name: transx-iris
    volumes:
      - ./iris/config.yaml:/etc/iris/config.yaml:ro
    ports:
      - "19090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # Kafka→Temporal bridge for transfer.requested (start workflow + delayed retries).
  consumer:
    <<: *backend
    container_name: transx-consumer
    command: ["consumer"]
    environment:
      <<: *backend-env
      HTTP__ADDRESS: ":4002"
      TEMPORAL__HOST_PORT: "temporal:7233"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      temporal:
        condition: service_healthy
    restart: unless-stopped

  # Consumes terminal transfer events and records notification dispatch attempts.
  notification:
    <<: *backend
    container_name: transx-notification
    command: ["notification"]
    environment:
      <<: *backend-env
      HTTP__ADDRESS: ":4003"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.notification.rule=PathPrefix(`/api/v1/inbox`)
      - traefik.http.routers.notification.entrypoints=web
      - traefik.http.routers.notification.priority=90
      - traefik.http.routers.notification.middlewares=cors,forward-auth
      - traefik.http.routers.notification.service=notification-svc
      - traefik.http.services.notification-svc.loadbalancer.server.port=4003

  fx:
    <<: *backend
    container_name: transx-fx
    command: ["fx"]
    environment:
      <<: *backend-env
      FX__LISTEN_ADDRESS: ":50051"
    restart: unless-stopped

  # Wallet gRPC service: serves Move/Hold/SettleHold/ReleaseHold. Not yet
  # called from any worker (wired up in a later phase); stood up here for
  # standalone verification. Internal service, no auth.
  wallet-grpc:
    <<: *backend
    container_name: transx-wallet-grpc
    command: ["wallet-grpc"]
    environment:
      <<: *backend-env
      WALLET__LISTEN_ADDRESS: ":50052"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # Bank gRPC service: stateless, mode-driven Submit/Query replacing
  # Bank gRPC mode-driven provider (wired for Temporal activities).
  # phase); stood up here for standalone verification. No auth, no DB.
  bank-grpc:
    <<: *backend
    container_name: transx-bank-grpc
    command: ["bank-grpc"]
    environment:
      <<: *backend-env
      BANK__MODE: "${BANK__MODE:-always_success}"
      BANK__LISTEN_ADDRESS: ":50053"
    restart: unless-stopped

  # Temporal's own Postgres, separate from the app database so workflow
  # history/state never shares a schema (or a backup/restore boundary) with
  # transx's own tables.
  temporal-postgres:
    image: postgres:18-alpine
    container_name: transx-temporal-postgres
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Temporal server (auto-setup image runs schema setup + the namespace
  # register on first boot, so no separate migration step is needed for dev).
  temporal:
    image: temporalio/auto-setup:1.29.1
    container_name: transx-temporal
    environment:
      # Driver name is a protocol family, not the actual Postgres version —
      # postgres12_pgx works against Postgres 12+ including our Postgres 18.
      DB: postgres12_pgx
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
      DEFAULT_NAMESPACE: transx
    ports:
      - "7233:7233"
    depends_on:
      temporal-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # Web UI for inspecting workflow executions during development.
  temporal-ui:
    image: temporalio/ui:2.40.1
    container_name: transx-temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped

  # Transfer Temporal worker: registers TransferWorkflow + activities, dials
  # Wallet/Bank/FX over gRPC. Not yet driving real traffic (wired in a later
  # phase); stood up here so the worker/Temporal connectivity can be verified
  # standalone.
  transfer-worker:
    <<: *backend
    container_name: transx-transfer-worker
    command: ["transfer-worker"]
    environment:
      <<: *backend-env
      HTTP__ADDRESS: ":4004"
      TEMPORAL__HOST_PORT: "temporal:7233"
      WALLET__GRPC_ADDRESS: "wallet-grpc:50052"
      BANK__GRPC_ADDRESS: "bank-grpc:50053"
      FX__GRPC_ADDRESS: "fx:50051"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      temporal:
        condition: service_healthy
      wallet-grpc:
        condition: service_started
      bank-grpc:
        condition: service_started
      fx:
        condition: service_started
    restart: unless-stopped

  # React Router v7 SSR + Auth BFF. Browser hits :3000; domain APIs stay on
  # Traefik :4000. Server-side auth uses the Docker network (service names).
  frontend:
    image: transx-frontend
    build:
      context: ./frontend
      args:
        # Baked into the client bundle — browser reaches Traefik on the host.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000/api/v1}
    container_name: transx-frontend
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      # SSR / BFF → Go auth via Traefik on the compose network (not localhost).
      AUTH_API_BASE_URL: ${AUTH_API_BASE_URL:-http://traefik/api/v1}
      RR_REDIS_URL: ${RR_REDIS_URL:-redis://redis-rr:6379}
      RR_AT_TTL_SECONDS: ${RR_AT_TTL_SECONDS:-900}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      redis-rr:
        condition: service_healthy
      auth:
        condition: service_started
      traefik:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  redis-rr-data:
  redpanda-data:
  temporal-postgres-data:
